<!DOCTYPE html>
<html lang="en">
<head>
    <title>Grocery App</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            text-align: center;
        }

        h1 {
            color: white;
            margin-top: 20px;
        }

        .container {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            border: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
        }

        .add-btn {
            background-color: green;
            color: white;
        }

        .load-btn {
            background-color: orange;
            color: white;
        }

        .delete-btn {
            background-color: red;
            color: white;
            float: right;
        }

        .card {
            background: white;
            margin: 15px auto;
            padding: 15px;
            width: 320px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: left;
        }
    </style>
</head>

<body>

<h1>🛒 Grocery Store</h1>

<div class="container">

    <!-- ADD PRODUCT -->
    <div>
        <label for="name"></label><input type="text" id="name" placeholder="Product Name">
        <label for="price"></label><input type="number" id="price" placeholder="Price">
        <label for="uom"></label><input type="number" id="uom" placeholder="UOM ID">
        <button class="add-btn" onclick="addProduct()">Add</button>
    </div>

    <button class="load-btn" onclick="loadProducts()">Load Products</button>

    <div id="productList"></div>

</div>

<script>
function loadProducts() {
    fetch("http://127.0.0.1:5000/getproducts")
        .then(res => res.json())
        .then(data => {
            let list = document.getElementById("productList");
            list.innerHTML = "";

            data.forEach(p => {
                let card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteProduct(${p.products_id})">X</button>
                    <h3>${p.name}</h3>
                    <p>Rs.${p.price_per_unit}</p>
                    <p>${p.uom_name}</p>
                `;

                list.appendChild(card);
            });
        });
}

// ADD PRODUCT
function addProduct() {
    let product = {
        name: document.getElementById("name").value,
        price_per_unit: document.getElementById("price").value,
        uom_id: document.getElementById("uom").value
    };

    fetch("http://127.0.0.1:5000/products", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(product)
    })
    .then(() => {
        alert("Product Added!");
        loadProducts();
    });
}

// DELETE PRODUCT
function deleteProduct(id) {
    fetch(`http://127.0.0.1:5000/products/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        alert("Deleted!");
        loadProducts();
    });
}
</script>

</body>
</html>
